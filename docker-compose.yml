services:
  api:
    build: ./back/backend-api/
    container_name: medusa-api
    ports:
      - "${API_PORT}:3000"
    volumes:
      - ./back/backend-api/:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=${API_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME} # ????
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgis/postgis
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./back/postgresql:/var/lib/postgresql/data
      - ./back/init-scripts:/docker-entrypoint-initdb.d/
    # If the db takes to much time to launch, we should increase the number of retries
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - ${ADMINER_PORT}:8080
